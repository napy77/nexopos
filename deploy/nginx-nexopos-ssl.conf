# NexoPOS · nginx para nexopos.app CON SSL ya emitido.
# Usar esta config cuando el certificado de Let's Encrypt ya existe
# (la instala manualmente el operador; ningún script la pisa):
#   cp deploy/nginx-nexopos-ssl.conf /etc/nginx/sites-available/nexopos
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name nexopos.app www.nexopos.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nexopos.app www.nexopos.app;

    ssl_certificate     /etc/letsencrypt/live/nexopos.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexopos.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 10m;
}
